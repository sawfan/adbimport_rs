<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>adbimport trunk_search</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 2rem;
        max-width: 60rem;
      }
      #results {
        background: #f5f5f5;
        padding: 1rem;
        border-radius: 6px;
        overflow-x: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.95rem;
      }
      th,
      td {
        text-align: left;
        padding: 0.35rem 0.5rem;
        border-bottom: 1px solid #ddd;
        vertical-align: top;
        white-space: nowrap;
      }
      th {
        background: #eee;
        position: sticky;
        top: 0;
      }
      td.name {
        white-space: normal;
        min-width: 16rem;
      }
      input {
        width: 30rem;
        max-width: 100%;
      }
    </style>
  </head>
  <body>
    <h1>adbimport .rkyv search (Trunk)</h1>
    <p>
      This loads <code>public/sample.rkyv</code> via <code>fetch</code> and uses
      <code>GenealogyStore</code> to run a name search.
    </p>

    <label>
      Name query:
      <input id="query" value="john" />
    </label>
    <button id="search">Search</button>

    <h2>Results</h2>
    <div id="status">Idle</div>
    <div id="results"></div>

    <!-- Copy static assets into the final dist so they can be fetched at runtime. -->
    <link data-trunk rel="copy-dir" href="public" />
    <link data-trunk rel="rust" />
  </body>
</html>
